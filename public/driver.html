<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Portal - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/main.js"></script>
    <link rel="stylesheet" href="/css/driver.css">
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <header class="dashboard-header animate-slide-up">
            <div>
                <h1 style="background: linear-gradient(to right, #22c55e, #6ee7b7); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Driver Dashboard</h1>
            </div>
            <div style="display:flex; align-items:center; gap:1.5rem;">
                <div id="header-dues" style="display:none; align-items:center; gap:0.5rem; color:#facc15; font-weight:bold; background:rgba(0,0,0,0.3); padding:0.5rem 1rem; border-radius:20px; border:1px solid #334155;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 18V6"></path></svg>
                    <span id="header-dues-amt">$0.00</span>
                </div>
                <div id="user-info"></div>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;">
            <!-- Left Sidebar: Vehicles & Phone -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">

                <div class="card animate-fade-in text-slate-100" id="dues-section" style="border-color: #ef4444; display: none;">
                    <h3 style="margin-bottom: 0.5rem; color: #ef4444;">Unpaid Dues</h3>
                    <p style="font-size: 2.5rem; font-weight: bold; margin-bottom: 0.5rem;" id="user-dues-amount">$0.00</p>
                    <p style="color:var(--text-muted); font-size: 0.875rem;">Pay your dues at the exit kiosk or contact the admin to clear this balance.</p>
                </div>
                
                <div class="card animate-fade-in text-slate-100" id="phone-prompt-section" style="display: none; border-color: #eab308;">
                    <h3 style="margin-bottom: 1rem; color: #eab308;">Phone Required</h3>
                    <p style="color:var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem;">Please provide a phone number before registering vehicles.</p>
                    <form id="phone-form">
                        <div class="form-group">
                            <input type="text" id="user-phone" pattern="\d{10}" title="Please enter exactly 10 digits" placeholder="e.g. 9876543210" required>
                        </div>
                        <button class="btn" style="width:100%; padding:0.5rem;">Save Number</button>
                    </form>
                </div>

                <div class="card animate-fade-in" id="vehicle-manager-section" style="display: none;">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">My Vehicles</h3>
                    
                    <div id="vehicles-list" style="margin-bottom: 2rem; display: flex; flex-direction: column; gap: 0.5rem;">
                        <!-- Injected -->
                    </div>

                    <h4 style="font-size: 1rem; margin-bottom: 1rem; border-top: 1px solid #334155; padding-top: 1rem;">Add New Vehicle</h4>
                    <form id="vehicle-form">
                        <div class="form-group">
                            <label>License Plate</label>
                            <input type="text" id="v-plate" required>
                        </div>
                        <div class="form-group">
                            <label>Vehicle Type</label>
                            <select id="v-type" style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;" required>
                                <option value="car">Car</option>
                                <option value="bike">Bike</option>
                                <option value="lorry">Lorry</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Make/Model</label>
                            <input type="text" id="v-make">
                        </div>
                        <button class="btn btn-secondary" style="width:100%; padding: 0.5rem;">Add Vehicle</button>
                    </form>
                </div>

            </div>

            <!-- Right Main: Sessions & Discovery -->
            <div>
                <h2 style="margin-bottom: 1rem; color: #facc15;">My Active Parking</h2>
                <div id="sessions-container" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem;"></div>

                <h2 style="margin-bottom: 1rem;">Find Parking</h2>
                <div id="discovery-container" class="grid"></div>
            </div>
        </div>
    </div>

    <!-- Reservation Modal -->
    <div id="reserve-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2 style="margin-bottom: 0.5rem;">Reserve Slot <span id="modal-slot-title"></span></h2>
            <p style="color:var(--text-muted); margin-bottom: 1.5rem;">Lot: <span id="modal-lot-title"></span></p>
            
            <form id="reserve-form">
                <input type="hidden" id="modal-slot-id">
                
                <div class="form-group">
                    <label>Select Vehicle to Park</label>
                    <select id="modal-vehicle-id" style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;" required>
                        <!-- Injected matching vehicles -->
                    </select>
                </div>
                
                <div class="form-group" style="margin-top: 2rem;">
                    <label>Reservation Type</label>
                    <select id="modal-action-type" onchange="toggleTimeInput()" style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;" required>
                        <option value="now">Park Now (Immediate Entry)</option>
                        <option value="later">Reserve for Later</option>
                    </select>
                </div>

                <div class="form-group hidden" id="reserve-time-container">
                    <label>Arrival Time</label>
                    <input type="datetime-local" id="modal-time" style="color-scheme: dark;">

                    <div style="margin-top: 1rem;">
                        <label>Duration (Hours)</label>
                        <input type="number" id="modal-duration-hours" min="1" max="72" value="1" style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary" style="width:50%;">Cancel</button>
                    <button type="submit" class="btn" style="width:50%;">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/driver.js"></script>
</body>
</html>
