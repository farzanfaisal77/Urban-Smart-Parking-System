<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/main.js"></script>
</head>

<body class="login-bg">
    <div class="container">

        <div class="auth-card animate-fade-in" id="login-section">
            <h2>Login</h2>
            <div id="login-error" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>

            <div class="form-toggle">
                Don't have an account? <a onclick="toggleForm()">Sign up</a>
            </div>
        </div>

        <div class="auth-card animate-fade-in hidden" id="signup-section">
            <h2>Driver Sign Up</h2>
            <div id="signup-error" class="error-msg"></div>
            <div id="signup-success" class="success-msg"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" minlength="4" required>
                </div>
                <button type="submit" class="btn btn-secondary" style="width: 100%;">Create Account</button>
            </form>

            <div class="form-toggle">
                Already have an account? <a onclick="toggleForm()">Login here</a>
            </div>
        </div>

    </div>

    <script>
        // Restrict if already logged in
        restrictAuth();

        const loginSec = document.getElementById('login-section');
        const signupSec = document.getElementById('signup-section');

        function toggleForm() {
            loginSec.classList.toggle('hidden');
            signupSec.classList.toggle('hidden');
        }

        // Login Handler
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');

            try {
                const res = await apiCall('/login', 'POST', { username: u, password: p });
                localStorage.setItem('user', JSON.stringify(res.user));

                // Redirect based on role
                if (res.user.role === 'admin') window.location.href = '/admin.html';
                else window.location.href = '/driver.html';
            } catch (err) {
                errEl.innerText = err.message;
            }
        };

        // Signup Handler
        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('signup-username').value;
            const p = document.getElementById('signup-password').value;
            const errEl = document.getElementById('signup-error');
            const sucEl = document.getElementById('signup-success');

            errEl.innerText = '';
            sucEl.innerText = '';

            try {
                const res = await apiCall('/signup', 'POST', { username: u, password: p });
                sucEl.innerText = res.message;
                document.getElementById('signup-form').reset();
            } catch (err) {
                errEl.innerText = err.message;
            }
        };
    </script>
</body>

</html>
