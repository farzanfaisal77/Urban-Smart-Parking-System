<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/main.js"></script>
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .users-table th, .users-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        .slot-types-container {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed #334155;
        }
        select.slot-type-select {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <header class="dashboard-header animate-slide-up">
            <div>
                <h1 style="background: linear-gradient(to right, #3b82f6, #93c5fd); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">City Planner Admin</h1>
            </div>
            <div id="user-info"></div>
        </header>

        <div class="dashboard-layout">
            <!-- Left Sidebar -->
            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <!-- Create New Lot Form -->
                <div class="card animate-fade-in text-slate-100">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Add Parking Lot</h3>
                    <div id="admin-error" class="error-msg"></div>
                    <div id="admin-success" class="success-msg"></div>
                    
                    <form id="create-lot-form">
                        <div class="form-group">
                            <label>Lot Name</label>
                            <input type="text" id="lot-name" required>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="lot-address" required>
                        </div>
                        <div class="form-group">
                            <label>Generate Slots (Default: Car)</label>
                            <input type="number" id="lot-slots" min="1" max="100" required>
                        </div>
                        <button type="submit" class="btn" style="width: 100%; border-radius: 8px;">Create Lot</button>
                    </form>
                </div>

                <!-- Registered Users -->
                <div class="card animate-fade-in">
                    <h3 style="font-size: 1.5rem;">Registered Drivers</h3>
                    <div style="overflow-x: auto;">
                        <table class="users-table" id="users-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Phone</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Injected -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Main Content -->
            <div class="card animate-fade-in">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Live Lot & Slot Configuration</h3>
                <div id="lots-container" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Lots injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        requireAuth('admin');

        async function loadUsers() {
            try {
                const users = await apiCall('/admin/users');
                const tbody = document.querySelector('#users-table tbody');
                tbody.innerHTML = users.map(u => {
                    const vehiclesArray = u.vehicles || [];
                    const vString = vehiclesArray.length === 0 
                        ? '<span style="color:var(--text-muted)">No vehicles</span>'
                        : vehiclesArray.map(v => `<span class="badge ${v.type}">${v.license_plate}</span>`).join(' ');
                        
                    return `
                    <tr>
                        <td style="color:var(--text-muted)">#${u.id}</td>
                        <td>
                            <div style="font-weight:bold">${u.username}</div>
                            <div style="font-size:0.75rem; margin-top:0.25rem;">${vString}</div>
                        </td>
                        <td>${u.phone || '<i style="color:var(--text-muted)">Not provided</i>'}</td>
                    </tr>
                `}).join('');
            } catch (e) { console.error('Error loading users', e); }
        }

        async function loadLots() {
            const container = document.getElementById('lots-container');
            try {
                const lots = await apiCall('/lots');
                if (lots.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted)">No lots created yet.</p>';
                    return;
                }
                
                container.innerHTML = '';

                for (let lot of lots) {
                    // Fetch slots for this lot to allow type editing
                    const slots = await apiCall(`/lots/${lot.lot_id}/slots`);
                    const occRate = lot.total > 0 ? ((lot.total - lot.available_slots) / lot.total * 100).toFixed(0) : 0;
                    
                    const lotEl = document.createElement('div');
                    lotEl.style = "background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);";
                    
                    let slotsHtml = slots.map(s => {
                        const isLocked = s.status !== 'available';
                        return `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding: 0.5rem; background: rgba(0,0,0,0.25); border-radius: 6px;">
                            <span style="font-family:monospace">Slot ${s.slot_number}</span>
                            <div style="display:flex; gap: 1rem; align-items:center;">
                                <select onchange="updateSlotStatus(${s.id}, this.value)" style="border:none; background:transparent; font-size:0.8rem; font-weight:bold; color:${!isLocked?'var(--primary)':'#ef4444'}">
                                    <option value="available" ${s.status==='available'?'selected':''}>AVAILABLE</option>
                                    <option value="occupied" ${s.status==='occupied'?'selected':''}>OCCUPIED</option>
                                    <option value="reserved" ${s.status==='reserved'?'selected':''}>RESERVED</option>
                                </select>
                                <select class="slot-type-select" onchange="updateSlotType(${s.id}, this.value)" ${isLocked ? 'disabled title="Cannot edit occupied slot"' : ''} style="${isLocked ? 'opacity:0.5; cursor:not-allowed;' : ''}; max-width: 80px;">
                                    <option value="car" ${s.slot_type==='car'?'selected':''}>Car</option>
                                    <option value="bike" ${s.slot_type==='bike'?'selected':''}>Bike</option>
                                    <option value="lorry" ${s.slot_type==='lorry'?'selected':''}>Lorry</option>
                                </select>
                            </div>
                        </div>
                    `}).join('');

                    lotEl.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem; align-items: flex-start;">
                            <div>
                                <h4 style="font-size: 1.5rem; margin-bottom: 0.25rem;">${lot.name}</h4>
                                <p style="color:var(--text-muted); font-size: 0.875rem;">${lot.address}</p>
                                <button onclick="deleteLot(${lot.lot_id})" style="background:transparent; border:none; color:#ef4444; font-size:0.75rem; cursor:pointer; margin-top:0.5rem; text-decoration:underline;">Delete Lot</button>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 0.8rem; color: var(--text-muted)">Occupancy</div>
                                <div style="font-size: 1.5rem; font-weight: bold; color: ${occRate > 80 ? '#ef4444' : 'var(--primary)'}">${occRate}%</div>
                            </div>
                        </div>
                        <div class="slot-types-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem;">
                            ${slotsHtml}
                        </div>
                    `;
                    container.appendChild(lotEl);
                }
            } catch (e) {
                console.error('Failed to load lots', e);
            }
        }

        window.updateSlotType = async (slotId, newType) => {
            try {
                await apiCall(`/slots/${slotId}`, 'PUT', { slot_type: newType });
                loadLots();
            } catch(e) {
                alert("Error updating slot: " + e.message);
            }
        };

        window.updateSlotStatus = async (slotId, newStatus) => {
            try {
                await apiCall(`/admin/slots/${slotId}/status`, 'PUT', { status: newStatus });
                loadLots();
            } catch(e) {
                alert("Error overriding status: " + e.message);
                loadLots(); // revert dropdown visually
            }
        };
        
        window.deleteLot = async (lotId) => {
            try {
                await apiCall(`/lots/${lotId}`, 'DELETE');
                loadLots();
            } catch(e) {
                alert("Error deleting lot: " + e.message);
            }
        }

        document.getElementById('create-lot-form').onsubmit = async (e) => {
            e.preventDefault();
            const n = document.getElementById('lot-name').value;
            const a = document.getElementById('lot-address').value;
            const s = parseInt(document.getElementById('lot-slots').value);
            
            const errEl = document.getElementById('admin-error');
            const sucEl = document.getElementById('admin-success');
            errEl.innerText = ''; sucEl.innerText = '';

            try {
                const res = await apiCall('/lots', 'POST', { name: n, address: a, total_slots: s });
                sucEl.innerText = res.message;
                document.getElementById('create-lot-form').reset();
                loadLots();
            } catch (err) {
                errEl.innerText = err.message;
            }
        };

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadLots();
            loadUsers();
        });
    </script>
</body>
</html>
