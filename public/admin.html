<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/main.js"></script>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <header class="dashboard-header animate-slide-up" style="margin-bottom: 1rem;">
            <div>
                <h1 style="background: linear-gradient(to right, #3b82f6, #93c5fd); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">City Planner Admin</h1>
            </div>
            <div id="user-info"></div>
        </header>

        <!-- Top Navigation -->
        <nav class="admin-nav animate-fade-in">
            <button class="active" onclick="switchTab('users')" id="nav-btn-users">USERS</button>
            <button onclick="switchTab('lots')" id="nav-btn-lots">PARKING LOTS</button>
            <button onclick="switchTab('sessions')" id="nav-btn-sessions">SESSIONS</button>
        </nav>

        <!-- USERS TAB -->
        <section id="tab-users" class="tab-content active">
            <div class="card">
                <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">Registered Drivers</h3>
                <div style="overflow-x: auto;">
                    <table class="fancy-table" id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Driver Info</th>
                                <th>Vehicles / Parking Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- PARKING LOTS TAB -->
        <section id="tab-lots" class="tab-content">
            <div class="dashboard-layout">
                <!-- Create New Lot Form -->
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <div class="card text-slate-100">
                        <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Add Parking Lot</h3>
                        <div id="admin-error" class="error-msg"></div>
                        <div id="admin-success" class="success-msg"></div>
                        
                        <form id="create-lot-form">
                            <div class="form-group">
                                <label>Lot Name</label>
                                <input type="text" id="lot-name" required>
                            </div>
                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" id="lot-address" required>
                            </div>
                            <div class="form-group">
                                <label>Generate Slots (Default: Car)</label>
                                <input type="number" id="lot-slots" min="1" max="100" required>
                            </div>
                            <div class="form-group">
                                <label>Price per Hour ($)</label>
                                <input type="number" id="lot-price" step="0.01" min="0" value="0.00" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px;">Create Lot</button>
                        </form>
                    </div>
                </div>

                <!-- Live Lot Configuration -->
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Live Lot & Slot Configuration</h3>
                    <div id="lots-container" style="display: flex; flex-direction: column; gap: 2rem;">
                        <!-- Lots injected here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- SESSIONS TAB -->
        <section id="tab-sessions" class="tab-content">
            <div class="card">
                <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">Global Parking Sessions</h3>
                <div style="overflow-x: auto;">
                    <table class="fancy-table" id="sessions-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>User</th>
                                <th>Vehicle</th>
                                <th>Lot</th>
                                <th>Slot No</th>
                                <th>Hours</th>
                                <th>Fee</th>
                                <th>Entry Time</th>
                                <th>Exit Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
